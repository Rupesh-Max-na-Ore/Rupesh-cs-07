name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # ✅ FIX: Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate snake (light + dark)
        uses: Platane/snk@v3
        with:
          github_user_name: Rupesh-Max-na-Ore
          outputs: |
            assets/snake.svg
            assets/snake-dark.svg?palette=github-dark

      - name: Commit snake files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update snake animation"